<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QR Scanner - Decode H Parameter</title>
  <!-- 与 HTML1 完全相同的库 -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    /* 完全沿用 HTML1 的扫描器相关样式 */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; display: flex; align-items: center; justify-content: center; }
    .container { background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 500px; padding: 25px; margin: 0 auto; }
    h2 { color: #333; text-align: center; margin-bottom: 20px; font-size: 24px; font-weight: 600; }

    .scan-section { background: #f8f9fa; border-radius: 8px; padding: 20px; text-align: center; border-left: 4px solid #667eea; }
    .scan-instruction { font-size: 16px; color: #667eea; font-weight: 600; margin-bottom: 15px; }

    .scanner-container {
      width: 100%; height: 300px; border: 2px dashed #bbb; border-radius: 8px;
      position: relative; background-color: #f9f9f9; transition: all 0.3s ease;
      overflow: hidden; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
    }
    @media (min-width: 768px) { .scanner-container { width: 300px; height: 300px; margin: 0 auto 15px; } }

    #scannerVideo { width: 100%; height: 100%; object-fit: cover; }
    #scannerCanvas { display: none; }

    .scanner-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.95); z-index: 2; flex-direction: column; padding: 20px; text-align: center;
    }
    .scanner-overlay.hidden { display: none; }

    .scanner-status { font-size: 14px; color: #666; margin-top: 15px; padding: 8px 15px; background: rgba(0,0,0,0.05); border-radius: 4px; }

    .scanner-controls { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
    .scanner-btn {
      padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.3s; background: #667eea; color: white;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .scanner-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); background: #5a6fd8; }
    .scanner-btn.stop { background: #f44336; }
    .scanner-btn.stop:hover { background: #e53935; box-shadow: 0 5px 15px rgba(244,67,54,0.4); }
    .scanner-btn.switch { background: #2196F3; }
    .scanner-btn.switch:hover { background: #1e88e5; box-shadow: 0 5px 15px rgba(33,150,243,0.4); }

    .camera-instruction { font-size: 13px; color: #2196F3; margin: 8px 0; font-weight: 500; padding: 6px 10px; background: rgba(33,150,243,0.1); border-radius: 4px; display: inline-block; }

    /* 结果展示区域 */
    .result-box { margin-top: 20px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 15px; display: none; }
    .result-box.show { display: block; }
    .result-box.error { background: #fef2f2; border-color: #fecaca; }
    .result-title { font-weight: 600; margin-bottom: 10px; font-size: 16px; }
    .result-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #e5e7eb; }
    .result-row:last-child { border-bottom: none; }
    .result-label { font-weight: 500; color: #374151; }
    .result-value { font-weight: 700; color: #111827; word-break: break-all; }
    .error-message { color: #b91c1c; font-size: 14px; }

    @media (max-width: 600px) {
      .container { padding: 15px; }
      h2 { font-size: 20px; }
    }
  </style>
</head>
<body>
<div class="container">
  <h2>📋 QR Code Scanner</h2>

  <!-- 扫描区域（完全复制 HTML1 结构） -->
  <div class="scan-section">
    <div class="scan-instruction">Scan a QR code to decode <b>Sales Order No.</b> and <b>Item No.</b></div>

    <div class="scanner-container" id="scannerContainer">
      <div class="scanner-overlay" id="scannerOverlay">
        <div style="font-size: 48px; margin-bottom: 10px;">📱</div>
        <p style="color: #666; margin-bottom: 15px; font-size: 16px;">QR Code Scanner Area</p>
        <div class="scanner-controls" id="scannerControls">
          <button class="scanner-btn" id="startScanner"><span>📷</span> Start Camera</button>
          <button class="scanner-btn stop" id="stopScanner" style="display: none;"><span>❌</span> Stop Camera</button>
          <button class="scanner-btn switch" id="switchCamera" style="display: none;"><span>🔄</span> Switch Camera</button>
        </div>
        <div class="scanner-status">
          <div style="margin-top: 15px; font-size: 13px; color: #888;">Supports both front and back cameras</div>
        </div>
      </div>
      <video id="scannerVideo" playsinline></video>
      <canvas id="scannerCanvas"></canvas>
    </div>
    <div class="camera-instruction" id="cameraInstruction" style="display: none;">
      <span class="scanning-status" style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; background-color: #4CAF50; animation: pulse 1.5s infinite;"></span> Scanning for QR codes...
    </div>
  </div>

  <!-- 解码结果显示区 -->
  <div class="result-box" id="resultBox">
    <div class="result-title" id="resultTitle">✅ Decoded Successfully</div>
    <div class="result-row">
      <span class="result-label">Sales Order No.</span>
      <span class="result-value" id="salesOrderDisplay">-</span>
    </div>
    <div class="result-row">
      <span class="result-label">Item No.</span>
      <span class="result-value" id="itemNoDisplay">-</span>
    </div>
    <div class="error-message" id="errorMessageDisplay" style="display: none;"></div>
  </div>
</div>

<script>
  // ========== 完全复用 HTML1 的扫描器逻辑 ==========
  let scannerVideo, scannerCanvas, scannerContext, scannerOverlay;
  let cameraInstruction, startScannerBtn, stopScannerBtn, switchCameraBtn;
  let qrScannerActive = false;
  let videoStream = null;
  let currentFacingMode = "environment";
  let html5QrcodeScanner = null;
  let isMobileDevice = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  // 结果 DOM 元素
  const resultBox = document.getElementById('resultBox');
  const resultTitle = document.getElementById('resultTitle');
  const salesOrderDisplay = document.getElementById('salesOrderDisplay');
  const itemNoDisplay = document.getElementById('itemNoDisplay');
  const errorMessageDisplay = document.getElementById('errorMessageDisplay');

  // 与 HTML1 相同的 Base64 解码
  function decodeBase64(str) {
    try {
      return decodeURIComponent(atob(str).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
    } catch (error) {
      throw new Error('Invalid base64 encoding');
    }
  }

  // 解析扫描文本，提取 ?H= 参数并解码
  function parseScannedData(scannedText) {
    if (!scannedText) return { success: false, error: 'Empty scan result' };
    let trimmed = scannedText.trim();
    let hValue = null;

    // 匹配 URL 中的 ?H= 或 &H=
    const match = trimmed.match(/[?&]H=([^&?#]+)/i);
    if (match) {
      hValue = match[1];
    } else if (trimmed.startsWith('?H=')) {
      hValue = trimmed.substring(3).split('&')[0].split('#')[0];
    } else if (/^[A-Za-z0-9+/=_-]+$/.test(trimmed) && trimmed.length > 4) {
      // 可能整个文本就是 base64 编码
      hValue = trimmed;
    }

    if (!hValue) {
      return { success: false, error: 'No valid "H" parameter found in scanned data.' };
    }

    try {
      const decoded = decodeBase64(hValue);
      const parts = decoded.split('&');
      if (parts.length !== 2) {
        return { success: false, error: 'Decoded data does not contain exactly two parts separated by &' };
      }
      return { success: true, salesOrderNo: parts[0], itemNo: parts[1] };
    } catch (e) {
      return { success: false, error: 'Failed to decode base64: ' + e.message };
    }
  }

  // 显示解码结果（扫描成功后调用，不停止扫描器）
  function displayDecodeResult(parseResult) {
    if (parseResult.success) {
      resultBox.classList.remove('error');
      resultBox.classList.add('show');
      resultTitle.textContent = '✅ Decoded Successfully';
      salesOrderDisplay.textContent = parseResult.salesOrderNo;
      itemNoDisplay.textContent = parseResult.itemNo;
      errorMessageDisplay.style.display = 'none';
    } else {
      resultBox.classList.add('error', 'show');
      resultTitle.textContent = '❌ Decode Failed';
      salesOrderDisplay.textContent = '-';
      itemNoDisplay.textContent = '-';
      errorMessageDisplay.style.display = 'block';
      errorMessageDisplay.textContent = parseResult.error;
    }
  }

  // ====== 扫描器启动/停止（完全照搬 HTML1） ======
  async function startQRScanner() {
    try {
      document.getElementById('startScanner').style.display = 'none';
      document.getElementById('stopScanner').style.display = 'inline-block';
      document.getElementById('switchCamera').style.display = 'inline-block';
      scannerOverlay.classList.add('hidden');
      cameraInstruction.style.display = 'block';

      if (isMobileDevice && typeof Html5QrcodeScanner !== 'undefined') {
        await startMobileQRScanner();
      } else {
        await startDesktopQRScanner();
      }
    } catch (error) {
      console.error("Camera error:", error);
      alert("Unable to access camera. Please check permissions.");
      stopQRScanner();
    }
  }

  async function startMobileQRScanner() {
    try {
      if (html5QrcodeScanner) { await html5QrcodeScanner.clear(); }
      html5QrcodeScanner = new Html5Qrcode("scannerContainer");
      await html5QrcodeScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
        (decodedText) => {
          // 扫描到内容 -> 解码显示，但不停止扫描器
          const parseResult = parseScannedData(decodedText);
          displayDecodeResult(parseResult);
        },
        (errorMessage) => {
          // 持续扫描中，忽略错误
        }
      );
    } catch (err) {
      alert("Camera initialization failed: " + err.message);
      stopQRScanner();
    }
  }

  async function startDesktopQRScanner() {
    try {
      const constraints = { video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } } };
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      videoStream = stream;
      scannerVideo.srcObject = stream;
      await scannerVideo.play();
      qrScannerActive = true;
      requestAnimationFrame(scanQRCode);
    } catch (error) {
      alert("Unable to access camera: " + error.message);
      stopQRScanner();
    }
  }

  function scanQRCode() {
    if (!qrScannerActive || !scannerContext) return;
    if (scannerVideo.readyState === scannerVideo.HAVE_ENOUGH_DATA) {
      scannerCanvas.width = scannerVideo.videoWidth;
      scannerCanvas.height = scannerVideo.videoHeight;
      scannerContext.drawImage(scannerVideo, 0, 0, scannerCanvas.width, scannerCanvas.height);
      try {
        const imageData = scannerContext.getImageData(0, 0, scannerCanvas.width, scannerCanvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
        if (code) {
          const parseResult = parseScannedData(code.data);
          displayDecodeResult(parseResult);
          // 桌面端也不停止扫描，继续识别下一个码
        }
      } catch (error) { console.warn('Error scanning QR code:', error); }
    }
    if (qrScannerActive) requestAnimationFrame(scanQRCode);
  }

  async function stopQRScanner() {
    qrScannerActive = false;
    if (html5QrcodeScanner) {
      try { await html5QrcodeScanner.stop(); html5QrcodeScanner.clear(); html5QrcodeScanner = null; }
      catch (err) { console.error("Error stopping mobile scanner:", err); }
    }
    if (videoStream) { videoStream.getTracks().forEach(track => track.stop()); videoStream = null; }
    if (scannerVideo) scannerVideo.srcObject = null;
    document.getElementById('startScanner').style.display = 'inline-block';
    document.getElementById('stopScanner').style.display = 'none';
    document.getElementById('switchCamera').style.display = 'none';
    scannerOverlay.classList.remove('hidden');
    cameraInstruction.style.display = 'none';
  }

  function switchCamera() {
    currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
    stopQRScanner();
    setTimeout(() => { startQRScanner(); }, 500);
  }

  // ========== 初始化 ==========
  document.addEventListener('DOMContentLoaded', function() {
    scannerContainer = document.getElementById("scannerContainer");
    scannerVideo = document.getElementById("scannerVideo");
    scannerCanvas = document.getElementById("scannerCanvas");
    scannerContext = scannerCanvas.getContext('2d', { willReadFrequently: true });
    scannerOverlay = document.getElementById("scannerOverlay");
    cameraInstruction = document.getElementById("cameraInstruction");
    startScannerBtn = document.getElementById("startScanner");
    stopScannerBtn = document.getElementById("stopScanner");
    switchCameraBtn = document.getElementById("switchCamera");

    document.getElementById('startScanner').addEventListener('click', startQRScanner);
    document.getElementById('stopScanner').addEventListener('click', stopQRScanner);
    document.getElementById('switchCamera').addEventListener('click', switchCamera);
  });
</script>
</body>
</html>
